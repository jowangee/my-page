<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>박영란 변호사 소개 페이지</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="badge-image">
    <img src="변호사뱃지.png" alt="변호사 변지" />
  </div>
  <main class="page-layout">
    <section class="hero-section">
      <div class="hero-image">
        <img src="의자(배경제거).png" alt="박영란 변호사 이미지" />
      </div>
      <div class="hero-copy">
        <p class="hero-tagline">당신과 함께하는 법률전문 전략파트너</p>
        <div class="hero-title">
          <span class="hero-role">변호사</span>
          <span class="hero-name">박영란</span>
        </div>
        <p class="hero-text">
          국가기관 및 공공기관에서 쌓은 다양한 경험을 바탕으로, 민사·형사·행정
          분야를 불문하고 종합적으로 검토하며 전략적인 대응을 제공합니다.
        </p>
        <a href="tel:062-223-2030" class="consultation-btn">
          <span class="phone-icon">&#9742;</span>
          상담예약 062 - 223 - 2030
        </a>
      </div>
    </section>

    <section class="directions-section">
      <div class="section-header">
        <span>&#128205;</span>
        <h2>찾아오시는 길</h2>
      </div>
      <p>광주광역시 동구 지산로73 법률사무소 영란</p>
      <div class="map-embed">
        <iframe
          src="https://maps.google.com/maps?q=%EA%B4%91%EC%A3%BC%EA%B4%91%EC%97%AD%EC%8B%9C%20%EB%8F%99%EA%B5%AC%20%EC%A7%80%EC%82%B0%EB%A1%9C73&z=17&output=embed"
          width="100%"
          height="320"
          style="border:0"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
      <p class="map-hint">광주지방법원 · 광주지방검찰청과 가까운 거리에 있습니다.</p>
      <div class="direction-links">
        <a
          href="https://www.google.com/maps/dir/?api=1&origin=%EA%B4%91%EC%A3%BC%EA%B4%91%EC%97%AD%EC%8B%9C%20%EB%8F%99%EA%B5%AC%20%EC%A7%80%EC%82%B0%EB%A1%9C73&destination=%EA%B4%91%EC%A3%BC%EC%A7%80%EB%B0%A9%EB%B2%95%EC%9B%90&destination=%EA%B4%91%EC%A3%BC%EC%A7%80%EB%B0%A9%EA%B2%80%EC%B0%B0%EC%B2%AD&travelmode=walking"
          target="_blank"
          rel="noopener"
          class="consultation-btn"
        >
          <span class="phone-icon">&#128205;</span>
          법원·검찰청까지 경로 보기
        </a>
        <a
          href="https://map.naver.com/p/search/법률사무소%20영란"
          target="_blank"
          rel="noopener"
          class="consultation-btn"
        >
          <span class="phone-icon">&#128205;</span>
          네이버 지도에서 보기
        </a>
      </div>
    </section>

    <section class="contact-form-section">
      <div class="section-header">
        <span>&#9993;</span>
        <h2>상담 · 문의 남기기</h2>
      </div>
      <p>아래 내용을 남겨주시면 확인 후 연락드리겠습니다.</p>
      <form id="inquiryForm" class="inquiry-form">
        <input type="hidden" name="access_key" value="4e172eb1-261e-47ac-9033-23fed2dc16f1" />
        <input type="hidden" name="subject" value="[홈페이지 문의] 새 상담 문의가 접수되었습니다" />
        <input type="hidden" name="from_name" value="박영란 변호사 홈페이지" />
        <input
          type="checkbox"
          name="botcheck"
          style="display: none"
          tabindex="-1"
          autocomplete="off"
        />

        <div class="form-row">
          <label for="name">성함</label>
          <input type="text" id="name" name="성함" required placeholder="홍길동" />
        </div>
        <div class="form-row">
          <label for="contact">연락처</label>
          <input
            type="text"
            id="contact"
            name="연락처"
            required
            placeholder="전화번호 또는 이메일"
          />
        </div>
        <div class="form-row">
          <label for="message">문의 내용</label>
          <textarea
            id="message"
            name="문의내용"
            rows="5"
            required
            placeholder="문의하실 내용을 간단히 적어주세요."
          ></textarea>
        </div>
        <button type="submit" id="submitBtn">문의 보내기</button>
        <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
